[build]
  command = "bash build.sh"
  publish = "."

[build.environment]
  # config.js is intentionally generated by build.sh with public client-side keys.
  # SUPABASE_KEY (anon/publishable) and PAYSTACK_PUBLIC_KEY are designed to be
  # visible in the browser — security is enforced by RLS and Paystack's server side.
  SECRETS_SCAN_OMIT_PATHS = "config.js"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
