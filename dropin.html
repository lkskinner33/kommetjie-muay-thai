<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Book a Drop-in – Kommetjie Muay Thai</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="logo.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#c4f135"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="KMT"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <style>
    .class-pick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 14px;
      margin-top: 24px;
    }
    .class-pick-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .class-pick-card:hover { border-color: #555; }
    .class-pick-card.selected { border-color: var(--lime); }
    .class-pick-card.past { opacity: .4; pointer-events: none; }
    .class-pick-card__day  { font-size:.72rem; font-weight:700; letter-spacing:1.5px; color:var(--mid); text-transform:uppercase; margin-bottom:4px; }
    .class-pick-card__date { font-size:.8rem; color:var(--mid); margin-bottom:10px; }
    .class-pick-card__time { font-family:var(--font-head); font-size:1.1rem; color:var(--lime); margin-bottom:4px; }
    .class-pick-card__name { font-size:.82rem; color:var(--mid); }
    .selected-summary {
      background: rgba(196,241,53,.08);
      border: 1px solid var(--lime);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-top: 24px;
      display: none;
    }
    .week-nav { display:flex; align-items:center; gap:16px; margin-bottom:8px; }
    .week-nav h3 { flex:1; }
  </style>
</head>
<body>
 
<nav class="nav">
  <div class="nav__inner">
    <a class="nav__logo" href="index.html">
      <img src="logo.png" alt="KMT" height="36" onerror="this.style.display='none'"/>
      <span>KMT</span>
    </a>
    <div class="nav-spacer"></div>
    <div id="nav-user"></div>
  </div>
</nav>
 
<div class="page">
  <div class="container--narrow">
 
    <div id="loading-screen" class="loading-screen">
      <div class="spinner"></div><span>Loading classes…</span>
    </div>
 
    <div id="main" style="display:none">
      <div class="page-title">
        <div style="font-size:.72rem;font-weight:700;letter-spacing:2px;color:var(--lime);text-transform:uppercase;margin-bottom:8px">Drop-in Class</div>
        <h1>Pick a Class</h1>
        <p>R150 per session. Select a class below then proceed to payment.</p>
      </div>
 
      <!-- Week navigation -->
      <div class="week-nav">
        <button class="btn btn-outline btn-sm" id="btn-prev" onclick="changeWeek(-1)">← Prev</button>
        <h3 id="week-label" class="text-center"></h3>
        <button class="btn btn-outline btn-sm" id="btn-next" onclick="changeWeek(1)">Next →</button>
      </div>
 
      <div id="class-grid" class="class-pick-grid"></div>
 
      <!-- Selected class summary -->
      <div class="selected-summary" id="selected-summary">
        <div style="font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--lime);margin-bottom:8px">Selected Class</div>
        <div id="selected-label" style="font-size:1rem;font-weight:600;margin-bottom:4px"></div>
        <div id="selected-date" style="font-size:.85rem;color:var(--mid);margin-bottom:16px"></div>
        <button class="btn btn-primary btn-full" id="btn-pay" onclick="payDropIn()">Pay R150 & Book →</button>
      </div>
    </div>
 
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="config.js"></script>
<script src="app2.js"></script>
<script>
  // Local dateForDow override
  function dateForDow(dow, weekOffset) {
    weekOffset = weekOffset || 0;
    var now   = new Date();
    var y     = now.getFullYear();
    var m     = now.getMonth();
    var d     = now.getDate();
    var day   = now.getDay();
    var toMon = day === 0 ? -6 : 1 - day;
    var mon   = new Date(y, m, d + toMon + weekOffset * 7);
    var off   = dow === 0 ? 6 : dow - 1;
    var t     = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + off);
    var mm    = String(t.getMonth() + 1).padStart(2, '0');
    var dd    = String(t.getDate()).padStart(2, '0');
    return t.getFullYear() + '-' + mm + '-' + dd;
  }
 
  let currentProfile = null;
  let allClasses     = [];
  let weekOffset     = 0;
  let selectedClassId   = null;
  let selectedClassDate = null;
  let selectedClassName = null;
  let selectedStartTime = null;
  let selectedEndTime   = null;
 
  const DROPIN_PRICE = 150;
 
  (async () => {
    const session = await requireAuth();
    if (!session) return;
 
    currentProfile = await getProfile(session.user.id);
    if (!currentProfile) { window.location.href = 'register.html?dropin=true'; return; }
 
    // If already a member, redirect to dashboard
    if ((currentProfile.membership_status || 'none') === 'active') {
      window.location.href = 'dashboard.html';
      return;
    }
 
    renderNav(currentProfile, session);
 
    const { data: classes } = await db.from('classes')
      .select('*').eq('active', true).order('day_of_week').order('start_time');
 
    allClasses = classes || [];
 
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
 
    renderWeek();
  })();
 
  function changeWeek(delta) {
    weekOffset += delta;
    if (weekOffset < 0) weekOffset = 0;
    selectedClassId = null;
    selectedClassDate = null;
    document.getElementById('selected-summary').style.display = 'none';
    renderWeek();
  }
 
  function renderWeek() {
    const now       = new Date();
    const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
    const day       = now.getDay();
    const toMon     = day === 0 ? -6 : 1 - day;
    const monday    = new Date(y, m, d + toMon + weekOffset * 7);
    const sunday    = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + 6);
    const fmt       = d => d.toLocaleDateString('en-ZA', {day:'numeric',month:'short'});
 
    document.getElementById('week-label').textContent =
      weekOffset === 0 ? 'This Week' :
      weekOffset === 1 ? 'Next Week' :
      `${fmt(monday)} – ${fmt(sunday)}`;
 
    document.getElementById('btn-prev').disabled = weekOffset <= 0;
 
    const order = [1,2,3,4,5,6,0];
    let html = '';
 
    order.forEach(dow => {
      allClasses.filter(c => c.day_of_week === dow).forEach(cls => {
        const classDate    = dateForDow(dow, weekOffset);
        const classDateObj = new Date(classDate + 'T' + cls.start_time);
        const isPast       = classDateObj < now;
        const isSelected   = selectedClassId === cls.id && selectedClassDate === classDate;
        const dateLabel    = new Date(classDate + 'T12:00:00').toLocaleDateString('en-ZA', {weekday:'short',day:'numeric',month:'short'});
 
        html += `
          <div class="class-pick-card${isPast ? ' past' : ''}${isSelected ? ' selected' : ''}"
               onclick="${isPast ? '' : `selectClass('${cls.id}','${classDate}','${cls.name}','${cls.start_time}','${cls.end_time}')`}">
            <div class="class-pick-card__day">${DAYS[dow]}</div>
            <div class="class-pick-card__date">${dateLabel}</div>
            <div class="class-pick-card__time">${formatTime(cls.start_time)} – ${formatTime(cls.end_time)}</div>
            <div class="class-pick-card__name">${cls.name}</div>
            ${isSelected ? '<div style="margin-top:10px;font-size:.75rem;font-weight:700;color:var(--lime)">✓ Selected</div>' : ''}
          </div>`;
      });
    });
 
    document.getElementById('class-grid').innerHTML = html || '<p class="text-mid">No classes scheduled this week.</p>';
  }
 
  function selectClass(classId, classDate, className, startTime, endTime) {
    selectedClassId   = classId;
    selectedClassDate = classDate;
    selectedClassName = className;
    selectedStartTime = startTime;
    selectedEndTime   = endTime;
 
    const dateLabel = new Date(classDate + 'T12:00:00').toLocaleDateString('en-ZA', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
 
    document.getElementById('selected-label').textContent = `${className} · ${formatTime(startTime)} – ${formatTime(endTime)}`;
    document.getElementById('selected-date').textContent  = dateLabel;
    document.getElementById('selected-summary').style.display = 'block';
 
    // Scroll to summary
    document.getElementById('selected-summary').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
 
    renderWeek();
  }
 
  function payDropIn() {
    if (!selectedClassId || !selectedClassDate) return;
 
    const handler = PaystackPop.setup({
      key:      PAYSTACK_PUBLIC_KEY,
      email:    currentProfile.email,
      amount:   DROPIN_PRICE * 100,
      currency: 'ZAR',
      metadata: {
        payment_type: 'dropin',
        user_id:      currentProfile.id,
        class_id:     selectedClassId,
        class_date:   selectedClassDate
      },
      callback: function(res) { confirmDropIn(res.reference); },
      onClose:  function() {}
    });
    handler.openIframe();
  }
 
  function confirmDropIn(reference) {
    showToast('Confirming payment…', 'info');
    fetch('/.netlify/functions/verify-payment', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ reference })
    })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        showToast('Booked! See you on the mats 🥊', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } else {
        showToast('Payment could not be confirmed. Please contact admin.', 'error');
      }
    })
    .catch(() => showToast('Network error. Please contact admin.', 'error'));
  }
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js")
        .then(r => console.log("SW registered:", r.scope))
        .catch(e => console.warn("SW failed:", e));
    });
  }
</script>
</body>
</html>
