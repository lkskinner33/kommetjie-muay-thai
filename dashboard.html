<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Classes – Kommetjie Muay Thai</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="logo.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#c4f135"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="KMT"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico"/>
  <style>
    .week-nav { display:flex; align-items:center; gap:16px; margin-bottom:32px; }
    .week-nav h2 { flex:1; }
    .week-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
    .class-card {
      background:var(--card); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:20px 18px; transition:border-color .2s;
    }
    .class-card--booked { border-color:var(--lime); }
    .class-card--past   { opacity:.5; }
    .class-card__day    { font-size:.72rem; font-weight:700; letter-spacing:1.5px; color:var(--mid); text-transform:uppercase; margin-bottom:6px; }
    .class-card__date   { font-size:.8rem; color:var(--mid); margin-bottom:10px; }
    .class-card__time   { font-family:var(--font-head); font-size:1.2rem; color:var(--lime); margin-bottom:4px; }
    .class-card__name   { font-size:.82rem; color:var(--mid); margin-bottom:14px; }
    .class-card__count  { font-size:.75rem; color:var(--mid); margin-top:8px; }
    .booked-label       { font-size:.75rem; font-weight:700; letter-spacing:.8px; color:var(--lime); margin-bottom:10px; text-transform:uppercase; }
    .locked-msg         { font-size:.75rem; color:var(--mid); margin-top:8px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a class="nav__logo" href="index.html">
      <img src="logo.png" alt="KMT" height="36" onerror="this.style.display='none'"/>
      <span>KMT</span>
    </a>
    <div class="nav-spacer"></div>
    <div id="nav-user"></div>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div id="loading-screen" class="loading-screen">
      <div class="spinner"></div><span>Loading your classes…</span>
    </div>

    <div id="main" style="display:none">

      <div class="flex-between mb-32">
        <div>
          <h1 id="greeting"></h1>
          <p id="subtext" style="margin-top:4px"></p>
        </div>
      </div>

      <!-- Week navigation -->
      <div class="week-nav">
        <button class="btn btn-outline btn-sm" id="btn-prev" onclick="changeWeek(-1)">← Prev</button>
        <h2 id="week-label" class="text-center"></h2>
        <button class="btn btn-outline btn-sm" id="btn-next" onclick="changeWeek(1)">Next →</button>
      </div>

      <div id="week-grid" class="week-grid"></div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  let currentProfile = null;
  let allClasses     = [];
  let allBookings    = [];
  let weekOffset     = 0;

  (async () => {
    const session = await requireAuth();
    if (!session) return;

    currentProfile = await getProfile(session.user.id);
    if (!currentProfile) { window.location.href = 'register.html'; return; }

    renderNav(currentProfile);

    const hour  = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = `${greet} 👊`;
    document.getElementById('subtext').textContent    = 'Book your classes for the week below.';

    // Load classes & bookings
    const [{ data: classes }, { data: bookings }] = await Promise.all([
      db.from('classes').select('*').eq('active', true).order('day_of_week').order('start_time'),
      db.from('bookings').select('*').eq('user_id', currentProfile.id).eq('status','confirmed')
    ]);

    allClasses  = classes  || [];
    allBookings = bookings || [];

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main').style.display           = 'block';

    renderWeek();
  })();

  // ── Week rendering ────────────────────────────────────────

  function changeWeek(delta) {
    weekOffset += delta;
    if (weekOffset < 0) weekOffset = 0; // can't go to past weeks
    renderWeek();
  }

  function renderWeek() {
    const now     = new Date();
    const monday  = new Date(now);
    monday.setDate(now.getDate() - now.getDay() + 1 + weekOffset * 7);
    monday.setHours(0,0,0,0);
    const sunday  = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    const fmtDate = d => d.toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
    document.getElementById('week-label').textContent =
      weekOffset === 0 ? 'This Week' :
      weekOffset === 1 ? 'Next Week' :
      `${fmtDate(monday)} – ${fmtDate(sunday)}`;

    document.getElementById('btn-prev').disabled = weekOffset <= 0;

    // Build cards for each class this week
    const order  = [1,2,3,4,5,6,0];
    let html     = '';

    order.forEach(dow => {
      const weekClasses = allClasses.filter(c => c.day_of_week === dow);
      if (!weekClasses.length) return;

      weekClasses.forEach(cls => {
        const classDate = dateForDow(dow, weekOffset);
        const classDateObj = new Date(classDate + 'T' + cls.start_time);
        const isPast = classDateObj < now;
        const booking = allBookings.find(b => b.class_id === cls.id && b.class_date === classDate);
        const isBooked = !!booking;
        const cancellable = isBooked && canCancel(classDate, cls.start_time);
        const bookable = !isBooked && !isPast;

        // Booking count for this class+date
        const countKey = `${cls.id}_${classDate}`;

        let cardClass = 'class-card';
        if (isBooked) cardClass += ' class-card--booked';
        if (isPast)   cardClass += ' class-card--past';

        const dateLabel = new Date(classDate + 'T12:00:00').toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short'});

        let actionHtml = '';
        if (isPast) {
          actionHtml = `<div class="locked-msg">Session passed</div>`;
        } else if (isBooked) {
          actionHtml = `<div class="booked-label">✓ Booked</div>`;
          if (cancellable) {
            actionHtml += `<button class="btn btn-outline btn-sm btn-full" onclick="cancelBooking('${booking.id}','${cls.id}','${classDate}','${cls.start_time}')">Cancel</button>`;
          } else {
            const cutoffMsg = parseInt(cls.start_time) < 12 ? 'Cancellations locked after 10 PM' : 'Cancellations locked after 9 AM';
            actionHtml += `<div class="locked-msg">🔒 ${cutoffMsg}</div>`;
          }
        } else {
          actionHtml = `<button class="btn btn-primary btn-sm btn-full" onclick="bookClass('${cls.id}','${classDate}','${cls.start_time}')">Book</button>`;
        }

        html += `
          <div class="${cardClass}" id="card-${cls.id}-${classDate}">
            <div class="class-card__day">${DAYS[dow]}</div>
            <div class="class-card__date">${dateLabel}</div>
            <div class="class-card__time">${formatTime(cls.start_time)} – ${formatTime(cls.end_time)}</div>
            <div class="class-card__name">${cls.name}</div>
            ${actionHtml}
            <div class="class-card__count" id="count-${cls.id}-${classDate}"></div>
          </div>`;
      });
    });

    document.getElementById('week-grid').innerHTML = html || '<p class="text-mid">No classes scheduled this week.</p>';

    // Load booking counts
    loadCounts();
  }

  async function loadCounts() {
    // Get all confirmed bookings for classes in the visible week
    const order = [1,2,3,4,5,6,0];
    const dates  = order.map(d => dateForDow(d, weekOffset));

    const { data } = await db.from('bookings')
      .select('class_id, class_date')
      .eq('status','confirmed')
      .in('class_date', dates);

    if (!data) return;
    const counts = {};
    data.forEach(b => {
      const key = `${b.class_id}_${b.class_date}`;
      counts[key] = (counts[key] || 0) + 1;
    });

    Object.entries(counts).forEach(([key, cnt]) => {
      const el = document.getElementById(`count-${key}`);
      if (el) el.textContent = `${cnt} ${cnt === 1 ? 'person' : 'people'} booked`;
    });
  }

  // ── Book ──────────────────────────────────────────────────

  async function bookClass(classId, classDate, startTime) {
    const classDateObj = new Date(classDate + 'T' + startTime);
    if (classDateObj < new Date()) return showToast('This session has already passed.','error');

    const btn = document.querySelector(`#card-${classId}-${classDate} .btn-primary`);
    if (btn) btn.disabled = true;

    const { error } = await db.from('bookings').upsert({
      user_id:    currentProfile.id,
      class_id:   classId,
      class_date: classDate,
      status:     'confirmed'
    }, { onConflict: 'user_id,class_id,class_date' });

    if (error) {
      showToast('Booking failed. Please try again.','error');
      if (btn) btn.disabled = false;
      return;
    }

    // Update local state
    allBookings.push({ id: 'temp', class_id: classId, class_date: classDate, status: 'confirmed' });
    // Refresh from DB to get real ID
    const { data: fresh } = await db.from('bookings').select('*')
      .eq('user_id', currentProfile.id).eq('status','confirmed');
    if (fresh) allBookings = fresh;

    showToast('Booked! See you there 🥊','success');
    renderWeek();
  }

  // ── Cancel ────────────────────────────────────────────────

  async function cancelBooking(bookingId, classId, classDate, startTime) {
    if (!canCancel(classDate, startTime)) {
      showToast('Cancellation window has closed.','error');
      return;
    }

    const btn = document.querySelector(`#card-${classId}-${classDate} .btn-outline`);
    if (btn) btn.disabled = true;

    const { error } = await db.from('bookings').update({
      status: 'cancelled',
      cancelled_at: new Date().toISOString()
    }).eq('id', bookingId);

    if (error) {
      showToast('Cancellation failed. Please try again.','error');
      if (btn) btn.disabled = false;
      return;
    }

    allBookings = allBookings.filter(b => b.id !== bookingId);
    showToast('Booking cancelled.','info');
    renderWeek();
  }
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js")
        .then(r => console.log("SW registered:", r.scope))
        .catch(e => console.warn("SW failed:", e));
    });
  }
</script>
</body>
</html>
