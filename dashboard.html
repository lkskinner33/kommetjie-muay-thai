<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Classes – Kommetjie Muay Thai</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="logo.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#c4f135"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="KMT"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico"/>
  <style>
    .week-nav { display:flex; align-items:center; gap:16px; margin-bottom:32px; }
    .week-nav h2 { flex:1; }
    .week-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
    .class-card {
      background:var(--card); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:20px 18px; transition:border-color .2s;
    }
    .class-card--booked { border-color:var(--lime); }
    .class-card--past   { opacity:.5; }
    .class-card__day    { font-size:.72rem; font-weight:700; letter-spacing:1.5px; color:var(--mid); text-transform:uppercase; margin-bottom:6px; }
    .class-card__date   { font-size:.8rem; color:var(--mid); margin-bottom:10px; }
    .class-card__time   { font-family:var(--font-head); font-size:1.2rem; color:var(--lime); margin-bottom:4px; }
    .class-card__name   { font-size:.82rem; color:var(--mid); margin-bottom:14px; }
    .class-card__count  { font-size:.75rem; color:var(--mid); margin-top:8px; }
    .booked-label       { font-size:.75rem; font-weight:700; letter-spacing:.8px; color:var(--lime); margin-bottom:10px; text-transform:uppercase; }
    .locked-msg         { font-size:.75rem; color:var(--mid); margin-top:8px; }
    .membership-banner  { border-radius:var(--radius); padding:16px 20px; margin-bottom:28px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .membership-banner--active   { background:rgba(196,241,53,.08); border:1px solid var(--lime); }
    .membership-banner--expired  { background:rgba(229,57,53,.08);  border:1px solid var(--red); }
    .membership-banner--none     { background:rgba(255,255,255,.04); border:1px solid var(--border); }
    .membership-banner__label    { font-size:.75rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
    .membership-banner__sub      { font-size:.82rem; color:var(--mid); }
    .section-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:32px; gap:0; }
    .section-tab  { padding:12px 20px; background:none; border:none; border-bottom:2px solid transparent;
                    color:var(--mid); font-family:var(--font-body); font-size:.9rem; font-weight:600;
                    cursor:pointer; white-space:nowrap; transition:all .2s; }
    .section-tab.active { color:var(--lime); border-bottom-color:var(--lime); }
    .section-panel { display:none; }
    .section-panel.active { display:block; }
    .register-table td { font-size:.85rem; }
    .register-date { font-size:.75rem; color:var(--mid); }
    .my-class-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:20px 18px; margin-bottom:16px; }
    .my-class-card--today { border-color:var(--lime); }
    .my-class-card__header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
    .my-class-card__time { font-family:var(--font-head); font-size:1.2rem; color:var(--lime); }
    .my-class-card__name { font-size:.85rem; color:var(--mid); margin-top:2px; }
    .my-class-card__date { font-size:.8rem; color:var(--mid); }
    .attendees { margin-top:12px; border-top:1px solid var(--border); padding-top:12px; }
    .attendees__label { font-size:.7rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--mid); margin-bottom:8px; }
    .attendees__list { display:flex; flex-wrap:wrap; gap:6px; }
    .attendee-chip { background:#1e1e1e; border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:.78rem; color:#ccc; }
    .attendee-chip--you { border-color:var(--lime); color:var(--lime); }
    .today-label { font-size:.72rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--lime); margin-bottom:16px; }
    .week-label-section { font-size:.72rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--mid); margin:24px 0 12px; }
    .lift-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; margin-bottom:28px; }
    .lift-stat  { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    .lift-stat__label { font-size:.75rem; color:var(--mid); margin-bottom:6px; }
    .lift-stat__val   { font-family:var(--font-head); font-size:1.8rem; color:var(--lime); line-height:1; }
    .lift-stat__unit  { font-size:.8rem; color:var(--mid); margin-left:2px; }
    .lift-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:14px; }
    .lift-card__header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .lift-card__avatar { width:36px; height:36px; border-radius:50%; background:rgba(196,241,53,.15); display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; color:var(--lime); flex-shrink:0; }
    .lift-card__name   { font-weight:600; font-size:.95rem; }
    .lift-card__total  { margin-left:auto; font-family:var(--font-head); font-size:1.1rem; color:var(--lime); }
    .lift-card__bars   { display:grid; gap:8px; }
    .lift-bar          { display:grid; grid-template-columns:90px 1fr 48px; align-items:center; gap:10px; font-size:.8rem; }
    .lift-bar__label   { color:var(--mid); }
    .lift-bar__track   { height:6px; background:var(--border); border-radius:4px; overflow:hidden; }
    .lift-bar__fill    { height:100%; background:var(--lime); border-radius:4px; transition:width .4s; }
    .lift-bar__val     { color:var(--text); text-align:right; font-weight:600; }
    .lift-form         { display:grid; gap:14px; margin-top:20px; }
    .lift-form input   { width:100%; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a class="nav__logo" href="index.html">
      <img src="logo.png" alt="KMT" height="36" onerror="this.style.display='none'"/>
      <span>KMT</span>
    </a>
    <div class="nav-spacer"></div>
    <div id="nav-user"></div>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div id="loading-screen" class="loading-screen">
      <div class="spinner"></div><span>Loading your classes…</span>
    </div>

    <div id="main" style="display:none">

      <!-- Membership banner -->
      <div id="membership-banner" class="membership-banner membership-banner--none" style="display:none"></div>

      <div class="flex-between mb-32">
        <div>
          <h1 id="greeting"></h1>
          <p id="subtext" style="margin-top:4px"></p>
        </div>
      </div>

      <!-- Section tabs -->
      <div class="section-tabs">
        <button class="section-tab active" onclick="switchSection('myclasses')">My Classes</button>
        <button class="section-tab"        onclick="switchSection('schedule')">Book a Class</button>
        <button class="section-tab"        onclick="switchSection('register')">Attendance</button>
        <button class="section-tab"        onclick="switchSection('strength')">Strength</button>
      </div>

      <!-- MY CLASSES PANEL -->
      <div class="section-panel active" id="panel-myclasses">
        <div id="myclasses-content">
          <div class="loading-screen" style="min-height:200px"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- SCHEDULE PANEL -->
      <div class="section-panel" id="panel-schedule">
        <div class="week-nav">
          <button class="btn btn-outline btn-sm" id="btn-prev" onclick="changeWeek(-1)">← Prev</button>
          <h2 id="week-label" class="text-center"></h2>
          <button class="btn btn-outline btn-sm" id="btn-next" onclick="changeWeek(1)">Next →</button>
        </div>
        <div id="week-grid" class="week-grid"></div>
      </div>

      <!-- STRENGTH PANEL -->
      <div class="section-panel" id="panel-strength">
        <div id="strength-content">
          <div class="loading-screen" style="min-height:200px"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- ATTENDANCE PANEL -->
      <div class="section-panel" id="panel-register">
        <div class="flex-between mb-24">
          <h3>My Attendance</h3>
          <span id="attendance-count" class="badge badge-lime"></span>
        </div>
        <div id="attendance-content">
          <div class="loading-screen" style="min-height:200px"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="config.js"></script>
<script src="app2.js"></script>
<script>
// Local override of dateForDow — immune to timezone issues
function dateForDow(dow, weekOffset) {
  weekOffset = weekOffset || 0;
  var now        = new Date();
  var y          = now.getFullYear();
  var m          = now.getMonth();
  var d          = now.getDate();
  var day        = now.getDay(); // 0=Sun
  var toMonday   = day === 0 ? -6 : 1 - day;
  var mondayDate = new Date(y, m, d + toMonday + weekOffset * 7);
  var offset     = dow === 0 ? 6 : dow - 1;
  var target     = new Date(mondayDate.getFullYear(), mondayDate.getMonth(), mondayDate.getDate() + offset);
  var mm = String(target.getMonth() + 1).padStart(2, '0');
  var dd = String(target.getDate()).padStart(2, '0');
  return target.getFullYear() + '-' + mm + '-' + dd;
}
</script>
<script>
  let currentProfile = null;
  let allClasses     = [];
  let allBookings    = [];
  let weekOffset     = 0;

  (async () => {
    const session = await requireAuth();
    if (!session) return;

    currentProfile = await getProfile(session.user.id);
    if (!currentProfile) { window.location.href = 'index.html'; return; }

    renderNav(currentProfile, session);

    const hour  = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = `${greet} 👊`;
    document.getElementById('subtext').textContent  = 'Book your classes for the week below.';

    renderMembershipBanner(currentProfile);

    // Request push permission on load (not just after booking)
    requestPushPermission();

    // Load classes & bookings
    const [{ data: classes }, { data: bookings }] = await Promise.all([
      db.from('classes').select('*').eq('active', true).order('day_of_week').order('start_time'),
      db.from('bookings').select('*').eq('user_id', currentProfile.id).eq('status','confirmed')
    ]);

    allClasses  = classes  || [];
    allBookings = bookings || [];

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main').style.display           = 'block';

    if (allClasses.length === 0) {
      document.getElementById('week-grid').innerHTML = '<p class="text-mid">No classes have been scheduled yet. Check back soon.</p>';
    } else {
      renderWeek();
    }

    // Switch to correct tab based on URL hash, default to My Classes
    if (window.location.hash === '#schedule') {
      switchSection('schedule');
    } else if (window.location.hash === '#attendance') {
      switchSection('register');
    } else {
      switchSection('myclasses');
    }
  })();

  // ── Week rendering ────────────────────────────────────────

  function changeWeek(delta) {
    weekOffset += delta;
    renderWeek();
  }

  function renderWeek() {
    const now        = new Date();
    const localYear  = now.getFullYear();
    const localMonth = now.getMonth();
    const localDate  = now.getDate();
    const dayOfWeek  = now.getDay(); // 0=Sun
    const diffToMonday = (dayOfWeek === 0) ? -6 : 1 - dayOfWeek;
    const monday  = new Date(localYear, localMonth, localDate + diffToMonday + weekOffset * 7);
    const sunday  = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + 6);

    const fmtDate = d => d.toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
    document.getElementById('week-label').textContent =
      weekOffset === 0 ? 'This Week' :
      weekOffset === 1 ? 'Next Week' :
      `${fmtDate(monday)} – ${fmtDate(sunday)}`;

    document.getElementById('btn-prev').disabled = false;

    // Build cards for each class this week
    const order  = [1,2,3,4,5,6,0];
    let html     = '';

    order.forEach(dow => {
      const weekClasses = allClasses.filter(c => c.day_of_week === dow);
      if (!weekClasses.length) return;

      weekClasses.forEach(cls => {
        const classDate = dateForDow(dow, weekOffset);
        const classDateObj = new Date(classDate + 'T' + cls.start_time);
        const isPast = classDateObj < now;
        const booking = allBookings.find(b => b.class_id === cls.id && b.class_date === classDate);
        const isBooked = !!booking;
        const cancellable = isBooked && canCancel(classDate, cls.start_time);
        const bookable = !isBooked && !isPast;

        // Booking count for this class+date
        const countKey = `${cls.id}_${classDate}`;

        let cardClass = 'class-card';
        if (isBooked) cardClass += ' class-card--booked';
        if (isPast)   cardClass += ' class-card--past';

        const dateLabel = new Date(classDate + 'T12:00:00').toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short'});

        let actionHtml = '';
        if (isPast) {
          actionHtml = `<div class="locked-msg">Session passed</div>`;
        } else if (isBooked) {
          const isDropIn = (currentProfile.membership_status || 'none') !== 'active';
          actionHtml = `<div class="booked-label">✓ ${isDropIn ? 'Drop-in Booked' : 'Booked'}</div>`;
          if (cancellable) {
            actionHtml += `<button class="btn btn-outline btn-sm btn-full" onclick="cancelBooking('${booking.id}','${cls.id}','${classDate}','${cls.start_time}')">Cancel</button>`;
          } else {
            const cutoffMsg = parseInt(cls.start_time) < 12 ? 'Cancellations locked after 10 PM' : 'Cancellations locked after 9 AM';
            actionHtml += `<div class="locked-msg">🔒 ${cutoffMsg}</div>`;
          }
        } else if (!isPast) {
          const isMember = (currentProfile.membership_status || 'none') === 'active';
          if (isMember) {
            actionHtml = `<button class="btn btn-primary btn-sm btn-full" onclick="bookClass('${cls.id}','${classDate}','${cls.start_time}')">Book</button>`;
          } else {
            actionHtml = `
              <div style="font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--mid);text-transform:uppercase;margin-bottom:8px">Drop-in</div>
              <button class="btn btn-outline btn-sm btn-full" onclick="payDropIn('${cls.id}','${classDate}','${cls.name}')">Pay & Book — R${DROPIN_PRICE}</button>`;
          }
        }

        html += `
          <div class="${cardClass}" id="card-${cls.id}-${classDate}">
            <div class="class-card__day">${DAYS[dow]}</div>
            <div class="class-card__date">${dateLabel}</div>
            <div class="class-card__time">${formatTime(cls.start_time)} – ${formatTime(cls.end_time)}</div>
            <div class="class-card__name">${cls.name}</div>
            ${actionHtml}
            <div class="class-card__count" id="count-${cls.id}-${classDate}"></div>
          </div>`;
      });
    });

    document.getElementById('week-grid').innerHTML = html || '<p class="text-mid">No classes scheduled this week.</p>';

    // Load booking counts
    loadCounts();
  }

  async function loadCounts() {
    // Get all confirmed bookings for classes in the visible week
    const order = [1,2,3,4,5,6,0];
    const dates  = order.map(d => dateForDow(d, weekOffset));

    const { data } = await db.from('bookings')
      .select('class_id, class_date')
      .eq('status','confirmed')
      .in('class_date', dates);

    if (!data) return;
    const counts = {};
    data.forEach(b => {
      const key = `${b.class_id}_${b.class_date}`;
      counts[key] = (counts[key] || 0) + 1;
    });

    Object.entries(counts).forEach(([key, cnt]) => {
      const el = document.getElementById(`count-${key}`);
      if (el) el.textContent = `${cnt} ${cnt === 1 ? 'person' : 'people'} booked`;
    });
  }

  // ── Book ──────────────────────────────────────────────────

  async function bookClass(classId, classDate, startTime) {
    const classDateObj = new Date(classDate + 'T' + startTime);
    if (classDateObj < new Date()) return showToast('This session has already passed.','error');

    const btn = document.querySelector(`#card-${classId}-${classDate} .btn-primary`);
    if (btn) btn.disabled = true;

    const { error } = await db.from('bookings').upsert({
      user_id:    currentProfile.id,
      class_id:   classId,
      class_date: classDate,
      status:     'confirmed'
    }, { onConflict: 'user_id,class_id,class_date' });

    if (error) {
      showToast('Booking failed. Please try again.','error');
      if (btn) btn.disabled = false;
      return;
    }

    // Update local state
    allBookings.push({ id: 'temp', class_id: classId, class_date: classDate, status: 'confirmed' });
    // Refresh from DB to get real ID
    const { data: fresh } = await db.from('bookings').select('*')
      .eq('user_id', currentProfile.id).eq('status','confirmed');
    if (fresh) allBookings = fresh;

    showToast('Booked! See you there 🥊','success');
    requestPushPermission();
    renderWeek();
  }

  // ── Cancel ────────────────────────────────────────────────

  async function cancelBooking(bookingId, classId, classDate, startTime) {
    if (!canCancel(classDate, startTime)) {
      showToast('Cancellation window has closed.','error');
      return;
    }

    const btn = document.querySelector(`#card-${classId}-${classDate} .btn-outline`);
    if (btn) btn.disabled = true;

    const { error } = await db.from('bookings').update({
      status: 'cancelled',
      cancelled_at: new Date().toISOString()
    }).eq('id', bookingId);

    if (error) {
      showToast('Cancellation failed. Please try again.','error');
      if (btn) btn.disabled = false;
      return;
    }

    allBookings = allBookings.filter(b => b.id !== bookingId);
    showToast('Booking cancelled.','info');
    renderWeek();
  }

  // ── Membership ────────────────────────────────────────────

  const DROPIN_PRICE    = 150;   // ZAR — drop-in price per class
  const VAPID_PUBLIC_KEY = 'BCcE9iZm5pDvm0WkUdqVb195iCU8D-FLKGKK7UxFD7e73d-VCP_uYmZo1l93K_W8c-QMgboH-JGE0TB761WCHK4';

  async function requestPushPermission() {
    if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
    if (Notification.permission === 'granted') {
      await subscribeToPush();
      return;
    }
    if (Notification.permission === 'denied') return;
    const permission = await Notification.requestPermission();
    if (permission === 'granted') await subscribeToPush();
  }

  async function subscribeToPush() {
    try {
      const reg = await navigator.serviceWorker.ready;

      // Unsubscribe from any existing subscription to get a fresh one
      const existing = await reg.pushManager.getSubscription();
      if (existing) await existing.unsubscribe();

      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });

      const res = await fetch('/.netlify/functions/save-subscription', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ subscription: sub.toJSON(), user_id: currentProfile.id })
      });

      if (res.ok) {
        console.log('Push subscription saved successfully');
      } else {
        console.warn('Failed to save push subscription:', await res.text());
      }
    } catch (err) {
      console.warn('Push subscription failed:', err);
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw     = window.atob(base64);
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  }
  const MONTHLY_PRICE   = 250;   // ZAR

  function renderMembershipBanner(profile) {
    const el = document.getElementById('membership-banner');
    if (!el) return;

    const status  = profile.membership_status || 'none';
    const expires = profile.membership_expires;

    el.style.display = 'flex';

    if (status === 'active') {
      el.className = 'membership-banner membership-banner--active';
      el.innerHTML = `
        <div>
          <div class="membership-banner__label" style="color:var(--lime)">✓ Active Member</div>
          <div class="membership-banner__sub">Monthly membership${expires ? ' · Renews ' + new Date(expires).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}) : ''}</div>
        </div>`;
    } else if (status === 'cancelled' || status === 'expired') {
      el.className = 'membership-banner membership-banner--expired';
      el.innerHTML = `
        <div>
          <div class="membership-banner__label" style="color:var(--red)">Membership ${status}</div>
          <div class="membership-banner__sub">Renew your membership or pay per class below.</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="payMonthly()">Renew — R${MONTHLY_PRICE}/mo</button>`;
    } else {
      el.className = 'membership-banner membership-banner--none';
      el.innerHTML = `
        <div>
          <div class="membership-banner__label">No Active Membership</div>
          <div class="membership-banner__sub">Join monthly or pay per class (drop-in R${DROPIN_PRICE}).</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="payMonthly()">Join — R${MONTHLY_PRICE}/mo</button>`;
    }
  }

  function payMonthly() {
    const handler = PaystackPop.setup({
      key:       PAYSTACK_PUBLIC_KEY,
      email:     currentProfile.email,
      amount:    MONTHLY_PRICE * 100,
      currency:  'ZAR',
      plan:      PAYSTACK_PLAN_CODE,
      metadata:  { payment_type: 'monthly', user_id: currentProfile.id },
      callback:  function(res) { confirmPayment(res.reference); },
      onClose:   function() {}
    });
    handler.openIframe();
  }

  function payDropIn(classId, classDate, className) {
    const handler = PaystackPop.setup({
      key:      PAYSTACK_PUBLIC_KEY,
      email:    currentProfile.email,
      amount:   DROPIN_PRICE * 100,
      currency: 'ZAR',
      metadata: { payment_type: 'dropin', user_id: currentProfile.id, class_id: classId, class_date: classDate },
      callback: function(res) { confirmPayment(res.reference, classId, classDate); },
      onClose:  function() {}
    });
    handler.openIframe();
  }

  // ── Section switching ────────────────────────────────────

  function switchSection(name) {
    document.querySelectorAll('.section-tab').forEach((b, i) => {
      b.classList.toggle('active', ['myclasses','schedule','register','strength'][i] === name);
    });
    document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'register')  loadAttendance();
    if (name === 'myclasses') loadMyClasses();
    if (name === 'strength')  loadStrength();
  }

  async function loadAttendance() {
    const el = document.getElementById('attendance-content');
    el.innerHTML = '<div class="loading-screen" style="min-height:200px"><div class="spinner"></div></div>';

    const { data } = await db.from('bookings')
      .select('*, classes(name, start_time, end_time)')
      .eq('user_id', currentProfile.id)
      .eq('status', 'confirmed')
      .order('class_date', { ascending: false });

    const count = document.getElementById('attendance-count');

    if (!data || data.length === 0) {
      count.textContent = '0 classes';
      el.innerHTML = '<div class="empty-state"><div class="emoji">📋</div>No classes attended yet.</div>';
      return;
    }

    count.textContent = data.length + ' ' + (data.length === 1 ? 'class' : 'classes');

    el.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Date</th><th>Class</th><th>Time</th></tr></thead><tbody>' +
      data.map(b => {
        const d    = new Date(b.class_date + 'T12:00:00');
        const date = d.toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
        return '<tr><td class="register-date">' + date + '</td><td>' + (b.classes?.name || '—') + '</td><td style="color:var(--lime)">' +
          (b.classes ? formatTime(b.classes.start_time) + ' – ' + formatTime(b.classes.end_time) : '—') + '</td></tr>';
      }).join('') +
      '</tbody></table></div>';
  }

  async function loadMyClasses() {
    const el = document.getElementById('myclasses-content');
    el.innerHTML = '<div class="loading-screen" style="min-height:200px"><div class="spinner"></div></div>';

    try {
      const today = new Date().toISOString().split('T')[0];

      const twoWeeks = new Date();
      twoWeeks.setDate(twoWeeks.getDate() + 14);
      const until = twoWeeks.toISOString().split('T')[0];

      const { data: myBookings, error: bookingError } = await db.from('bookings')
        .select('*, classes(name, start_time, end_time)')
        .eq('user_id', currentProfile.id)
        .eq('status', 'confirmed')
        .gte('class_date', today)
        .lte('class_date', until)
        .order('class_date')
        .order('classes(start_time)');

      if (bookingError) throw bookingError;

      if (!myBookings || myBookings.length === 0) {
        el.innerHTML = `<div class="empty-state">
          <div class="emoji">📅</div>
          <p>You have no upcoming classes booked.</p>
          <button class="btn btn-primary mt-16" onclick="switchSection('schedule')">Browse Schedule</button>
        </div>`;
        return;
      }

      // Load attendees for same class+date combinations
      const dates    = [...new Set(myBookings.map(b => b.class_date))];
      const classIds = [...new Set(myBookings.map(b => b.class_id))];

      const { data: allBookings } = await db.from('bookings')
        .select('class_id, class_date, profiles(full_name)')
        .eq('status', 'confirmed')
        .in('class_date', dates)
        .in('class_id', classIds);

      const attendeeMap = {};
      (allBookings || []).forEach(b => {
        const key = `${b.class_id}_${b.class_date}`;
        if (!attendeeMap[key]) attendeeMap[key] = [];
        if (b.profiles?.full_name) attendeeMap[key].push(b.profiles.full_name);
      });

      let html = '';
      let lastDate = null;

      myBookings.forEach(b => {
        if (!b.classes) return; // skip if class data missing
        const isToday   = b.class_date === today;
        const dateLabel = new Date(b.class_date + 'T12:00:00').toLocaleDateString('en-ZA', {
          weekday: 'long', day: 'numeric', month: 'long'
        });

        if (b.class_date !== lastDate) {
          html += `<div class="${isToday ? 'today-label' : 'week-label-section'}">${isToday ? '⚡ Today' : dateLabel}</div>`;
          lastDate = b.class_date;
        }

        const key       = `${b.class_id}_${b.class_date}`;
        const attendees = attendeeMap[key] || [];
        const others    = attendees.filter(n => n !== currentProfile.full_name);

        html += `
          <div class="my-class-card${isToday ? ' my-class-card--today' : ''}">
            <div class="my-class-card__header">
              <div>
                <div class="my-class-card__time">${formatTime(b.classes.start_time)} – ${formatTime(b.classes.end_time)}</div>
                <div class="my-class-card__name">${b.classes.name}</div>
              </div>
              <div class="my-class-card__date">${isToday ? 'Today' : new Date(b.class_date + 'T12:00:00').toLocaleDateString('en-ZA', {weekday:'short', day:'numeric', month:'short'})}</div>
            </div>
            <div class="attendees">
              <div class="attendees__label">Who's coming (${attendees.length})</div>
              <div class="attendees__list">
                <span class="attendee-chip attendee-chip--you">You</span>
                ${others.map(n => `<span class="attendee-chip">${n.split(' ')[0]}</span>`).join('')}
              </div>
            </div>
          </div>`;
      });

      el.innerHTML = html || `<div class="empty-state"><div class="emoji">📅</div><p>No upcoming classes.</p></div>`;

    } catch (err) {
      console.error('loadMyClasses error:', err);
      el.innerHTML = `<div class="empty-state">
        <div class="emoji">⚠️</div>
        <p>Couldn't load your classes. Please try again.</p>
        <button class="btn btn-outline mt-16" onclick="loadMyClasses()">Retry</button>
      </div>`;
    }
  }

  // ── Strength Tracker ─────────────────────────────────────

  let strengthEditing = false;

  async function loadStrength() {
    const el = document.getElementById('strength-content');
    el.innerHTML = '<div class="loading-screen" style="min-height:200px"><div class="spinner"></div></div>';

    try {
      // Load all members' lifts joined with their profile names
      const { data: lifts, error } = await db
        .from('strength_lifts')
        .select('*, profiles(full_name)')
        .order('updated_at', { ascending: false });

      if (error) throw error;

      // My lift record
      const myLift = (lifts || []).find(l => l.user_id === currentProfile.id);
      const maxTotal = Math.max(...(lifts || []).map(l => (l.deadlift + l.squat + l.bench_press)), 1);

      let html = '';

      // My stats summary
      const myDl = myLift?.deadlift || 0;
      const mySq = myLift?.squat    || 0;
      const myBp = myLift?.bench_press || 0;
      const myTotal = myDl + mySq + myBp;

      html += `
        <div class="lift-grid">
          <div class="lift-stat"><div class="lift-stat__label">My total</div><div><span class="lift-stat__val">${myTotal}</span><span class="lift-stat__unit">kg</span></div></div>
          <div class="lift-stat"><div class="lift-stat__label">Deadlift</div><div><span class="lift-stat__val">${myDl}</span><span class="lift-stat__unit">kg</span></div></div>
          <div class="lift-stat"><div class="lift-stat__label">Squat</div><div><span class="lift-stat__val">${mySq}</span><span class="lift-stat__unit">kg</span></div></div>
          <div class="lift-stat"><div class="lift-stat__label">Bench press</div><div><span class="lift-stat__val">${myBp}</span><span class="lift-stat__unit">kg</span></div></div>
        </div>

        <div class="flex-between mb-16">
          <h3>Gym Totals</h3>
          <button class="btn btn-primary btn-sm" onclick="toggleStrengthEdit()">
            ${myLift ? 'Update my lifts' : '+ Add my lifts'}
          </button>
        </div>

        <div id="strength-edit-form" style="display:none" class="card mb-24">
          <h3 class="mb-16">${myLift ? 'Update your lifts' : 'Add your lifts'}</h3>
          <div class="lift-form">
            <div class="form-group" style="margin-bottom:0">
              <label>Deadlift (kg)</label>
              <input type="number" id="lift-dl" value="${myDl}" min="0" max="500" placeholder="0"/>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Squat (kg)</label>
              <input type="number" id="lift-sq" value="${mySq}" min="0" max="500" placeholder="0"/>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Bench press (kg)</label>
              <input type="number" id="lift-bp" value="${myBp}" min="0" max="500" placeholder="0"/>
            </div>
            <div class="flex gap-16">
              <button class="btn btn-outline" onclick="toggleStrengthEdit()">Cancel</button>
              <button class="btn btn-primary" style="flex:1" onclick="saveLifts()">Save</button>
            </div>
          </div>
        </div>`;

      // All members' lift cards
      if (!lifts || lifts.length === 0) {
        html += '<div class="empty-state"><div class="emoji">🏋️</div><p>No lifts recorded yet. Be the first!</p></div>';
      } else {
        lifts.forEach(l => {
          const name   = l.profiles?.full_name || 'Member';
          const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
          const dl     = l.deadlift    || 0;
          const sq     = l.squat       || 0;
          const bp     = l.bench_press || 0;
          const total  = dl + sq + bp;
          const isMe   = l.user_id === currentProfile.id;

          html += `
            <div class="lift-card${isMe ? ' card--lime' : ''}">
              <div class="lift-card__header">
                <div class="lift-card__avatar">${initials}</div>
                <div class="lift-card__name">${name.split(' ')[0]}${isMe ? ' (you)' : ''}</div>
                <div class="lift-card__total">${total} kg</div>
              </div>
              <div class="lift-card__bars">
                <div class="lift-bar">
                  <div class="lift-bar__label">Deadlift</div>
                  <div class="lift-bar__track"><div class="lift-bar__fill" style="width:${Math.round(dl/maxTotal*100)}%"></div></div>
                  <div class="lift-bar__val">${dl} kg</div>
                </div>
                <div class="lift-bar">
                  <div class="lift-bar__label">Squat</div>
                  <div class="lift-bar__track"><div class="lift-bar__fill" style="width:${Math.round(sq/maxTotal*100)}%"></div></div>
                  <div class="lift-bar__val">${sq} kg</div>
                </div>
                <div class="lift-bar">
                  <div class="lift-bar__label">Bench press</div>
                  <div class="lift-bar__track"><div class="lift-bar__fill" style="width:${Math.round(bp/maxTotal*100)}%"></div></div>
                  <div class="lift-bar__val">${bp} kg</div>
                </div>
              </div>
            </div>`;
        });
      }

      el.innerHTML = html;

    } catch (err) {
      console.error('loadStrength error:', err);
      el.innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><p>Could not load strength data. Please try again.</p><button class="btn btn-outline mt-16" onclick="loadStrength()">Retry</button></div>';
    }
  }

  function toggleStrengthEdit() {
    const form = document.getElementById('strength-edit-form');
    if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  async function saveLifts() {
    const dl = parseFloat(document.getElementById('lift-dl').value) || 0;
    const sq = parseFloat(document.getElementById('lift-sq').value) || 0;
    const bp = parseFloat(document.getElementById('lift-bp').value) || 0;

    const { error } = await db.from('strength_lifts').upsert({
      user_id:     currentProfile.id,
      deadlift:    dl,
      squat:       sq,
      bench_press: bp,
      updated_at:  new Date().toISOString()
    }, { onConflict: 'user_id' });

    if (error) {
      showToast('Failed to save. Please try again.', 'error');
      return;
    }

    showToast('Lifts saved!', 'success');
    loadStrength();
  }

  async function confirmPayment(reference, classId, classDate) {
    showToast('Confirming payment…', 'info');
    try {
      const res  = await fetch('/.netlify/functions/verify-payment', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ reference })
      });
      const data = await res.json();
      if (data.ok) {
        // Refresh profile
        const { data: fresh } = await db.from('profiles').select('*').eq('id', currentProfile.id).single();
        if (fresh) currentProfile = fresh;
        renderMembershipBanner(currentProfile);

        if (data.payment_type === 'dropin' && classId && classDate) {
          const { data: freshBookings } = await db.from('bookings').select('*').eq('user_id', currentProfile.id).eq('status','confirmed');
          if (freshBookings) allBookings = freshBookings;
          showToast("Payment confirmed — you're booked! 🥊", 'success');
        } else {
          showToast('Membership activated! 🥊', 'success');
        }
        renderWeek();
      } else {
        showToast('Payment could not be confirmed. Contact admin.', 'error');
      }
    } catch (err) {
      showToast('Network error confirming payment.', 'error');
    }
  }
</script>
